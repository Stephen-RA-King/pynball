# https://docs.github.com/en/actions
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    # Step 1. Set up operating system
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      # Step 2. Check-out repository so we can access its contents
      - uses: actions/checkout@v7
      # Step 3. Set up Python
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      # Step 4. Install the dependencies from requirements.txt file
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install flake8 pytest pytest-cov
          pip install -r requirements/test.txt
      # Step 5. Install package
      - name: Install package
        run: |
          pip install -e .
      # Step 6. Lint the files with flake8
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true
      # Step 7. Run the tests
      - name: Test with pytest
        run: |
          pytest tests/ --cov=pynball --cov-report=xml
      # Step 8. Use Codecov to track coverage
      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true
